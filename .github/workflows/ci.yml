name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo & Tauri tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ci-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ci-cargo-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ci-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ci-node-

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend build (tsc + vite)
        run: npm --prefix frontend run build

      - name: Frontend unit tests (vitest)
        run: npm --prefix frontend run test

      - name: Rust cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Config sync check (Barricade)
        run: node scripts/config-sync.js --strict

      - name: Documentation gate (Barricade)
        run: node scripts/doc-gate.js --ci
