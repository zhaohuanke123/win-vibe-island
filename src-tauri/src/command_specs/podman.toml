[command]
name = "podman"
description = "Simple management tool for pods, containers, and images."

[[command.subcommands]]
name = "ps"
description = "List all containers (both running and stopped):"

[[command.subcommands]]
name = "run"
description = "Create a container from an image"

[[command.subcommands]]
name = "pull"
description = "Pull an image from a registry (defaults to Docker Hub):"

[[command.subcommands]]
name = "images"
description = "Display the list of already downloaded images:"

[[command.subcommands]]
name = "exec"
description = "Open a shell inside an already running container:"

[[command.subcommands]]
name = "rm"
description = "Remove a stopped container:"

[[command.subcommands]]
name = "logs"
description = "Display the logs of one or more containers and follow log output:"

[[command.options]]
short = "-a"
long = "--all"
description = "包含所有（包括隐藏项）"

[[command.options]]
short = ""
long = "--name"
description = "指定名称"

[[command.options]]
short = "-f"
long = "--follow"
description = "强制执行，不提示确认"
