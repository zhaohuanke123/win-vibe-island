[command]
name = "env"
description = "Show the environment or run a program in a modified environment."

[[command.subcommands]]
name = "="
description = "Set a variable and run a program:"

[[command.options]]
short = "-i"
long = "--ignore-environment"
description = "交互模式"

[[command.options]]
short = "-u"
long = "--unset"
description = "指定用户"

[[command.options]]
short = "-a"
long = "--argv0"
description = "包含所有（包括隐藏项）"
