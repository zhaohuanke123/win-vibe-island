[command]
name = "clang"
description = "Compile C, C++, and Objective-C source files. Can be used as a drop-in replacement for GCC."

[[command.options]]
short = "-o"
long = "--output"
description = "指定输出"

[[command.options]]
short = "-g"
long = "--debug"
description = "指定组 / 全局"

[[command.options]]
short = "-O"
long = ""
description = "远程文件名保存"

[[command.options]]
short = "-g"
long = ""
description = "指定组 / 全局"

[[command.options]]
short = "-I"
long = ""
description = "指定输入 / 忽略大小写"

[[command.options]]
short = "-L"
long = ""
