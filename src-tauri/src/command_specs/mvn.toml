[command]
name = "mvn"
description = "Apache Maven: build and manage Java-based projects."

[[command.subcommands]]
name = "compile"
description = "Compile a project:"

[[command.subcommands]]
name = "package"
description = "Compile and package the compiled code in its distributable format"

[[command.subcommands]]
name = "install"
description = "Install the built package in local maven repository"

[[command.subcommands]]
name = "clean"
description = "Delete build artifacts from the target directory:"

[[command.subcommands]]
name = "exec:java"
description = "Run a class with a main method:"

[[command.options]]
short = "-D"
long = "--define"
description = "定义宏 / 调试"

[[command.options]]
short = "-P"
long = "--activate-profiles"
description = "Perl 正则表达式 / 保留权限"
