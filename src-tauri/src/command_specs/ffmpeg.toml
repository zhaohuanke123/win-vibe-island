[command]
name = "ffmpeg"
description = "Video conversion tool."

[[command.subcommands]]
name = "44100"
description = "Transcode a FLAC file to Red Book CD format (44100kHz"

[[command.subcommands]]
name = "'scale=-1:1000'"
description = "Save a video as GIF"

[[command.subcommands]]
name = "image2"
description = "Combine numbered images (`frame_1"

[[command.subcommands]]
name = "copy"
description = "Trim a video from a given start time mm:ss to an end time mm2:ss2 (omit the -to flag to trim till the end):"

[[command.subcommands]]
name = ".avi"
description = "Convert AVI video to MP4"

[[command.subcommands]]
name = ".mkv"
description = "Remux MKV video to MP4 without re-encoding audio or video streams:"

[[command.subcommands]]
name = ".mp4"
description = "Convert MP4 video to VP9 codec"

