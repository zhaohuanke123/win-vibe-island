<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatusDot + BarsGlyph 原型 — 状态指示器</title>
<style>
:root {
  --ink:#0d0d0f; --paper:#f1ead9; --ink-soft:rgba(241,234,217,0.55); --ink-mute:rgba(241,234,217,0.30);
  --line:rgba(255,255,255,0.08); --bg-soft:rgba(255,255,255,0.025);
  --glass-bg:rgba(13,13,15,0.85); --glass-border:rgba(255,255,255,0.06);
  --glass-shadow:0 2px 16px rgba(0,0,0,0.32),0 0 0 1px rgba(255,255,255,0.04);
  --phase-idle:#9a958a; --phase-running:#6ea7ff; --phase-approval:#f4a4a4;
  --phase-answer:#ffd58a; --phase-completed:#6fb982;
  --font-ui:'Segoe UI Variable','Inter','Segoe UI',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Cascadia Code','Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:var(--font-ui);display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:32px}

h2{color:var(--ink-soft);font-size:13px;font-weight:400}
h3{color:var(--ink-mute);font-size:10px;font-weight:400;margin-bottom:12px}

.card{background:var(--glass-bg);backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:16px;padding:24px;box-shadow:var(--glass-shadow);display:flex;flex-direction:column;align-items:center;gap:20px}
.row{display:flex;gap:32px;align-items:center}

.state-switcher{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.state-btn{padding:4px 12px;border-radius:12px;border:1px solid var(--glass-border);background:transparent;color:var(--ink-soft);font-size:11px;cursor:pointer;transition:all 120ms ease;font-family:var(--font-ui)}
.state-btn:hover{background:var(--bg-soft);color:var(--paper)}
.state-btn.active{border-color:var(--phase-running);color:var(--phase-running);background:rgba(110,167,255,0.08)}

/* StatusDot */
.dot-demo{display:flex;flex-direction:column;align-items:center;gap:8px}
.dot-demo .dot{width:9px;height:9px;border-radius:50%;transition:background-color 150ms ease}
.dot-demo .dot.running{box-shadow:0 0 8px var(--phase-running);animation:dotPulse 1s ease-in-out infinite;background:var(--phase-running)}
.dot-demo .dot.approval{box-shadow:0 0 10px var(--phase-approval);animation:dotPulse 0.6s ease-in-out infinite;background:var(--phase-approval)}
.dot-demo .dot.answer{box-shadow:0 0 6px var(--phase-answer);animation:dotPulse 1.2s ease-in-out infinite;background:var(--phase-answer)}
.dot-demo .dot.idle{background:var(--phase-idle)}
.dot-demo .dot.done{background:var(--phase-completed);box-shadow:0 0 6px var(--phase-completed)}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.dot-demo .label{font-size:10px;color:var(--ink-mute);font-family:var(--font-mono)}

/* BarsGlyph */
.glyph-demo{display:flex;flex-direction:column;align-items:center;gap:8px}
.glyph-demo svg{width:24px;height:24px}
.glyph-demo .label{font-size:10px;color:var(--ink-mute);font-family:var(--font-mono)}

/* 四个变体对比 */
.variant-row{display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap;justify-content:center;margin-top:16px}
.variant{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 16px;border-radius:10px;background:var(--bg-soft)}
.variant-name{font-size:10px;color:var(--ink-mute);font-family:var(--font-mono)}

/* bar 变体 */
.var-bar{width:36px;height:5px;border-radius:3px;background:var(--phase-running);animation:dotPulse 1s ease-in-out infinite}

/* tint 变体 */
.var-tint{padding:3px 8px;border-radius:5px;font-size:10px;color:var(--phase-running);background:rgba(110,167,255,0.12);font-family:var(--font-mono)}

.dim-note{color:var(--ink-mute);font-size:10px;font-family:var(--font-mono);margin-top:8px}
</style>
</head>
<body>

<div class="state-switcher" id="switcher">
  <button class="state-btn" data-state="idle">idle</button>
  <button class="state-btn active" data-state="running">running</button>
  <button class="state-btn" data-state="approval">waitingForApproval</button>
  <button class="state-btn" data-state="answer">waitingForAnswer</button>
  <button class="state-btn" data-state="done">completed</button>
</div>

<div class="row">
  <!-- StatusDot -->
  <div class="card">
    <h3>StatusDot · 9×9px</h3>
    <div class="dot-demo">
      <div class="dot running" id="statusDot"></div>
      <span class="label" id="dotLabel">running · #6ea7ff · 1s pulse</span>
    </div>
  </div>

  <!-- BarsGlyph -->
  <div class="card">
    <h3>BarsGlyph · 24×24px SVG</h3>
    <div class="glyph-demo">
      <svg width="24" height="24" viewBox="0 0 24 24" id="barsGlyph">
        <!-- running 模式: 条高跳动 -->
        <rect x="5.25" y="10" width="2.5" height="4" rx="1.25" fill="var(--phase-running)">
          <animate attributeName="height" values="4;12;4" dur="0.9s" repeatCount="indefinite"/>
          <animate attributeName="y" values="10;6;10" dur="0.9s" repeatCount="indefinite"/>
        </rect>
        <rect x="10.75" y="10" width="2.5" height="4" rx="1.25" fill="var(--phase-running)">
          <animate attributeName="height" values="4;14;4" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
          <animate attributeName="y" values="10;5;10" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
        </rect>
        <rect x="16.25" y="10" width="2.5" height="4" rx="1.25" fill="var(--phase-running)">
          <animate attributeName="height" values="4;10;4" dur="0.9s" begin="0.30s" repeatCount="indefinite"/>
          <animate attributeName="y" values="10;7;10" dur="0.9s" begin="0.30s" repeatCount="indefinite"/>
        </rect>
      </svg>
      <span class="label" id="glyphLabel">running · SMIL animate · 0.9s staggered</span>
    </div>
  </div>
</div>

<!-- 四种变体对比 -->
<div class="card" style="margin-top:8px">
  <h3>StateIndicator 四种变体</h3>
  <div class="variant-row">
    <div class="variant">
      <div class="dot running" style="width:9px;height:9px;border-radius:50%;background:var(--phase-running);box-shadow:0 0 8px var(--phase-running);animation:dotPulse 1s ease-in-out infinite"></div>
      <span class="variant-name">dot (9px)</span>
    </div>
    <div class="variant">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <rect x="5.25" y="10" width="2.5" height="4" rx="1.25" fill="var(--phase-running)"><animate attributeName="height" values="4;12;4" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="10;6;10" dur="0.9s" repeatCount="indefinite"/></rect>
        <rect x="10.75" y="10" width="2.5" height="4" rx="1.25" fill="var(--phase-running)"><animate attributeName="height" values="4;14;4" dur="0.9s" begin="0.15s" repeatCount="indefinite"/><animate attributeName="y" values="10;5;10" dur="0.9s" begin="0.15s" repeatCount="indefinite"/></rect>
        <rect x="16.25" y="10" width="2.5" height="4" rx="1.25" fill="var(--phase-running)"><animate attributeName="height" values="4;10;4" dur="0.9s" begin="0.30s" repeatCount="indefinite"/><animate attributeName="y" values="10;7;10" dur="0.9s" begin="0.30s" repeatCount="indefinite"/></rect>
      </svg>
      <span class="variant-name">glyph (24px)</span>
    </div>
    <div class="variant">
      <div class="var-bar"></div>
      <span class="variant-name">bar (36×5px)</span>
    </div>
    <div class="variant">
      <div class="var-tint">running</div>
      <span class="variant-name">tint (tag)</span>
    </div>
  </div>
  <div class="dim-note">由 config.stateIndicator 字段控制</div>
</div>

<script>
const stateInfo = {
  idle:    {color:'#9a958a', label:'idle · #9a958a · no animation'},
  running: {color:'#6ea7ff', label:'running · #6ea7ff · 1s pulse'},
  approval:{color:'#f4a4a4', label:'approval · #f4a4a4 · 0.6s pulse'},
  answer:  {color:'#ffd58a', label:'answer · #ffd58a · 1.2s pulse'},
  done:    {color:'#6fb982', label:'done · #6fb982 · glow'},
};

document.querySelectorAll('.state-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.state-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const s = stateInfo[btn.dataset.state];
    // 更新 dot
    const dot = document.getElementById('statusDot');
    dot.className = 'dot ' + btn.dataset.state;
    dot.style.background = s.color;
    if (btn.dataset.state !== 'idle' && btn.dataset.state !== 'done') {
      dot.style.boxShadow = `0 0 8px ${s.color}`;
    } else if (btn.dataset.state === 'done') {
      dot.style.boxShadow = `0 0 4px ${s.color}`;
    } else {
      dot.style.boxShadow = 'none';
    }
    document.getElementById('dotLabel').textContent = s.label;

    // 更新 glyph - rebuilt for idle/waiting/done modes
    const g = document.getElementById('barsGlyph');
    const st = btn.dataset.state;
    if (st === 'idle') {
      g.innerHTML = `<rect x="5.25" y="10" width="2.5" height="3" rx="1.25" fill="${s.color}"/><rect x="10.75" y="9" width="2.5" height="5" rx="1.25" fill="${s.color}"><animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/></rect><rect x="16.25" y="10" width="2.5" height="3" rx="1.25" fill="${s.color}"/>`;
      document.getElementById('glyphLabel').textContent = 'idle · middle bar breath · 2.8s';
    } else if (st === 'done') {
      g.innerHTML = `<path d="M6 12 l4 4 l8-8" stroke="${s.color}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><animate attributeName="stroke-dasharray" from="0,24" to="24,0" dur="0.4s" fill="freeze"/></path>`;
      document.getElementById('glyphLabel').textContent = 'done · checkmark draw · 0.4s';
    } else if (st === 'approval' || st === 'answer') {
      g.innerHTML = `<rect x="5.25" y="7" width="2.5" height="10" rx="1.25" fill="${s.color}"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></rect><rect x="10.75" y="7" width="2.5" height="10" rx="1.25" fill="${s.color}" opacity="0"/><rect x="16.25" y="7" width="2.5" height="10" rx="1.25" fill="${s.color}"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></rect>`;
      document.getElementById('glyphLabel').textContent = `${st} · cross-pulse · 1.8s`;
    } else {
      g.innerHTML = `<rect x="5.25" y="10" width="2.5" height="4" rx="1.25" fill="${s.color}"><animate attributeName="height" values="4;12;4" dur="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="10;6;10" dur="0.9s" repeatCount="indefinite"/></rect><rect x="10.75" y="10" width="2.5" height="4" rx="1.25" fill="${s.color}"><animate attributeName="height" values="4;14;4" dur="0.9s" begin="0.15s" repeatCount="indefinite"/><animate attributeName="y" values="10;5;10" dur="0.9s" begin="0.15s" repeatCount="indefinite"/></rect><rect x="16.25" y="10" width="2.5" height="4" rx="1.25" fill="${s.color}"><animate attributeName="height" values="4;10;4" dur="0.9s" begin="0.30s" repeatCount="indefinite"/><animate attributeName="y" values="10;7;10" dur="0.9s" begin="0.30s" repeatCount="indefinite"/></rect>`;
      document.getElementById('glyphLabel').textContent = st + ' · SMIL animate · 0.9s staggered';
    }
  });
});
</script>

</body>
</html>
