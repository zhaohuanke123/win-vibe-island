<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JumpToast 原型 — 跳转提示</title>
<style>
:root {
  --ink:#0d0d0f; --paper:#f1ead9; --ink-soft:rgba(241,234,217,0.55); --ink-mute:rgba(241,234,217,0.30);
  --line:rgba(255,255,255,0.08);
  --glass-bg:rgba(13,13,15,0.85); --glass-border:rgba(255,255,255,0.06);
  --glass-shadow:0 2px 16px rgba(0,0,0,0.32),0 0 0 1px rgba(255,255,255,0.04);
  --phase-approval:#f4a4a4; --phase-running:#6ea7ff;
  --font-ui:'Segoe UI Variable','Inter','Segoe UI',system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Cascadia Code','Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:var(--font-ui);display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px}
h2{color:var(--ink-soft);font-size:13px;font-weight:400}

.toast-area{position:relative;width:300px;height:120px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.toast{
  max-width:260px;padding:10px 14px;border-radius:10px;
  background:var(--glass-bg);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);
  font-size:11px;color:var(--paper);
  animation:toastIn 200ms cubic-bezier(0.22,1,0.36,1) forwards;
  opacity:0;transform:translateY(12px);
}
.toast.exiting{animation:toastOut 200ms ease-out forwards}
.toast .toast-title{font-size:12px;font-weight:500;margin-bottom:3px}
.toast .toast-path{font-size:10px;font-family:var(--font-mono);color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast.error .toast-title{color:var(--phase-approval)}
@keyframes toastIn{to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(12px)}}

.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.trigger-btn{padding:6px 16px;border-radius:12px;border:1px solid var(--glass-border);background:transparent;color:var(--ink-soft);font-size:11px;cursor:pointer;transition:all 120ms ease;font-family:var(--font-ui)}
.trigger-btn:hover{background:var(--bg-soft);color:var(--paper);border-color:var(--phase-running)}
.trigger-btn.error:hover{border-color:var(--phase-approval);color:var(--phase-approval)}
.dim-note{color:var(--ink-mute);font-size:10px;font-family:var(--font-mono)}
</style>
</head>
<body>
<h2>JumpToast — 跳转反馈浮层</h2>

<div class="controls">
  <button class="trigger-btn" onclick="showToast('success')">跳转成功</button>
  <button class="trigger-btn error" onclick="showToast('error')">跳转失败</button>
</div>

<div class="toast-area" id="toastArea"></div>

<div class="dim-note">280px 最大宽度 · 圆角 10px · enter 200ms springSmooth · 2.5s 后自动消失</div>

<script>
function showToast(type) {
  const area = document.getElementById('toastArea');
  // remove old
  const old = area.querySelector('.toast');
  if (old) { old.classList.add('exiting'); setTimeout(()=>old.remove(), 200); }

  const toast = document.createElement('div');
  toast.className = 'toast' + (type === 'error' ? ' error' : '');
  if (type === 'success') {
    toast.innerHTML = '<div class="toast-title">✓ 已跳转</div><div class="toast-path">C:\\Users\\project\\src\\index.ts:42</div>';
  } else {
    toast.innerHTML = '<div class="toast-title">✗ 跳转失败</div><div class="toast-path">目标文件不存在或已被移动</div>';
  }
  area.appendChild(toast);

  // 2.5s 后消失
  setTimeout(() => {
    if (toast.parentNode) {
      toast.classList.add('exiting');
      setTimeout(() => toast.remove(), 200);
    }
  }, 2500);
}
</script>
</body>
</html>
